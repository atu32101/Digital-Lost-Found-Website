{% extends "base.html" %}

{% block title %}Add Item - Lost & Found{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto;">
    <h1><i class="fas fa-plus-circle"></i> Add New Item</h1>
    
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" required>
        </div>
        
        <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" name="category" required>
                <option value="lost">Lost Item</option>
                <option value="found">Found Item</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="location">Location *</label>
            <input type="text" id="location" name="location" placeholder="e.g., Library, Canteen" required>
        </div>
        
        <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" name="description" rows="5" placeholder="Detailed description..." required></textarea>
        </div>
        
        <div class="form-group">
            <label for="contact">Contact Details *</label>
            <input type="text" id="contact" name="contact" placeholder="Phone/Email" required>
        </div>
        
        <div class="form-group">
            <label for="image">Image (optional)</label>
            <input type="file" id="image" name="image" accept="image/*">
            <img id="imagePreview" src="" alt="Preview">
        </div>
        
        <button type="submit" class="btn" style="width: 100%;"><i class="fas fa-paper-plane"></i> Add Item</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem;">
        <a href="{{ url_for('index') }}" class="btn btn-secondary" style="display: inline-block;"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </p>
</div>
{% endblock %}
