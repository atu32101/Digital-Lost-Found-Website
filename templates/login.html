{% extends "base.html" %}

{% block title %}Login - Lost & Found{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; margin: 0 auto;">
    <h1><i class="fas fa-sign-in-alt"></i> Login</h1>
    <p style="text-align: center; margin-bottom: 2rem;">Demo: username <strong>student</strong>, password <strong>pass123</strong></p>
    
    <form method="POST">
        <div class="form-group">
            <label for="username"><i class="fas fa-user"></i> Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        
        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;"><i class="fas fa-sign-in-alt"></i> Login</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem;">
        <a href="{{ url_for('index') }}">← Back to Home</a>
    </p>
</div>
{% endblock %}
